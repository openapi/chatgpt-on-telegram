<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ChatGPT on Telegram</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    :root {
      color-scheme: light;
      --page: #f6f0fb;
      --panel: #ffffff;
      --ink: #18202f;
      --muted: #6b5f7e;
      --line: #ddd5ea;
      --purple: #563e7d;
      --purple-hover: #7b669e;
      --dark: #070b0f;
      --focus: #f1b642;
      --danger: #b42318;
      --ok: #087f5b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 10%, rgba(86, 62, 125, 0.13), transparent 35%),
        radial-gradient(circle at 85% 5%, rgba(123, 102, 158, 0.11), transparent 30%),
        var(--page);
    }

    /* ── Navbar ── */
    .navbar {
      background: var(--dark);
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .navbar a {
      display: flex;
      align-items: center;
      text-decoration: none;
    }

    .navbar img {
      height: 32px;
      width: auto;
    }

    .navbar-right {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .navbar-right a {
      color: rgba(255,255,255,0.75);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-decoration: none;
      transition: color .2s;
    }

    .navbar-right a:hover {
      color: #fff;
    }

    /* ── Main content ── */
    main {
      width: min(1040px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0 80px;
    }

    .shell {
      display: grid;
      gap: 24px;
    }

    .masthead {
      display: grid;
      gap: 20px;
      justify-items: center;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(36px, 7vw, 72px);
      line-height: 0.96;
      letter-spacing: 0;
      color: var(--dark);
    }

    .equation {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      font-weight: 700;
    }

    .brand {
      display: grid;
      width: 72px;
      height: 72px;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.86);
      color: var(--dark);
      box-shadow: 0 18px 36px rgba(7, 11, 15, 0.13);
    }

    .brand img {
      width: 42px;
      height: 42px;
      object-fit: contain;
    }

    .operator {
      min-width: 20px;
      color: var(--purple);
      font-size: 28px;
      font-weight: 900;
    }

    .emoji {
      font-size: 38px;
      line-height: 1;
    }

    /* ── Panel ── */
    .panel {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 18px 48px rgba(86, 62, 125, 0.10);
      overflow: hidden;
      backdrop-filter: blur(14px);
    }

    form {
      display: grid;
      gap: 18px;
      padding: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 18px;
      align-items: end;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    input,
    select {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 14px;
      color: var(--ink);
      background: #fff;
      font: inherit;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    input:focus,
    select:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(86, 62, 125, 0.18);
    }

    .action-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding-top: 4px;
    }

    /* ── Button ── */
    button {
      position: relative;
      overflow: hidden;
      min-height: 48px;
      border: none;
      border-radius: 8px;
      padding: 0 28px;
      color: #fff;
      background: var(--purple);
      font: inherit;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      z-index: 0;
      transition: color .2s;
    }

    button::before {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--purple-hover);
      left: -100%;
      top: 0;
      height: 100%;
      width: 0;
      transform: skew(50deg);
      transform-origin: top left;
      transition: width .4s ease;
      z-index: -1;
    }

    button:hover::before {
      width: 200%;
    }

    button:hover {
      color: #fff;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.68;
    }

    .status {
      min-height: 24px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
    }

    .status.error {
      color: var(--danger);
    }

    .status.ok {
      color: var(--ok);
    }

    /* ── Launch box ── */
    .launch-box {
      display: none;
      gap: 12px;
      padding: 18px 24px 24px;
      border-top: 1px solid var(--line);
      background: rgba(246, 240, 251, 0.6);
    }

    .launch-box.visible {
      display: grid;
    }

    .launch-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 10px;
      align-items: center;
    }

    .chat-url {
      display: block;
      min-height: 48px;
      overflow-wrap: anywhere;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px 14px;
      color: var(--muted);
      background: #fff;
      text-decoration: none;
      transition: border-color .2s, color .2s;
    }

    .chat-url:hover {
      color: var(--dark);
      border-color: var(--purple);
    }

    .icon-button,
    .open-link {
      display: grid;
      width: 48px;
      height: 48px;
      place-items: center;
      border-radius: 8px;
      color: #fff;
      background: var(--purple);
      text-decoration: none;
      transition: background .2s;
    }

    .icon-button:hover,
    .open-link:hover {
      background: var(--purple-hover);
    }

    .icon-button svg,
    .open-link svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
    }

    /* ── Footer ── */
    footer {
      background: var(--dark);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    footer span {
      color: rgba(255,255,255,0.45);
      font-size: 13px;
    }

    footer a {
      display: flex;
      align-items: center;
    }

    footer img {
      height: 20px;
      width: auto;
      opacity: 0.85;
      transition: opacity .2s;
    }

    footer a:hover img {
      opacity: 1;
    }

    /* ── Responsive ── */
    @media (max-width: 720px) {
      main {
        width: min(100% - 24px, 1040px);
        padding: 32px 0 56px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      form {
        padding: 18px;
      }

      .brand {
        width: 58px;
        height: 58px;
        border-radius: 18px;
      }

      .brand img {
        width: 34px;
        height: 34px;
      }

      .operator {
        display: none;
      }

      .action-row,
      button,
      .launch-row {
        width: 100%;
      }

      .launch-row {
        grid-template-columns: 1fr;
      }

      .icon-button,
      .open-link {
        width: 100%;
      }

      .navbar-right {
        display: none;
      }
    }
  </style>
</head>
<body>

  <nav class="navbar" aria-label="Openapi">
    <a href="https://openapi.com" target="_blank" rel="noopener noreferrer" aria-label="Openapi homepage">
      <img src="/assets/logo-openapi-w.svg" alt="Openapi" width="120" height="36">
    </a>
    <div class="navbar-right">
      <a href="https://openapi.com/products" target="_blank" rel="noopener noreferrer">Products</a>
      <a href="https://console.openapi.com/register" target="_blank" rel="noopener noreferrer">Sign Up</a>
      <a href="https://console.openapi.com/login" target="_blank" rel="noopener noreferrer">Login</a>
    </div>
  </nav>

  <main>
    <div class="shell">
      <section class="masthead" aria-labelledby="page-title">
        <h1 id="page-title">ChatGPT on Telegram</h1>
        <div class="equation" aria-label="ChatGPT più Telegram uguale Openapi più emoji con occhiali da sole">
          <span class="brand" title="ChatGPT"><img src="/assets/images/chatgpt.png" alt="ChatGPT"></span>
          <span class="operator">+</span>
          <span class="brand" title="Telegram"><img src="/assets/images/telegram.png" alt="Telegram"></span>
          <span class="operator">=</span>
          <span class="brand" title="Openapi"><img src="/assets/images/openapi.png" alt="Openapi"></span>
          <span class="operator">+</span>
          <span class="brand" title="Cool"><span class="emoji" aria-label="Emoji con occhiali da sole">😎</span></span>
        </div>
      </section>

      <section class="panel" aria-label="Configurazione bot">
        <form id="bot-form" method="post" action="/setup">
          <div class="field">
            <label for="openai_api_key">OpenAI API Key</label>
            <input id="openai_api_key" name="openai_api_key" type="password" autocomplete="off" spellcheck="false" required>
          </div>

          <div class="field">
            <label for="chatgpt_prompt_id">ChatGPT Prompt ID</label>
            <input id="chatgpt_prompt_id" name="chatgpt_prompt_id" type="password" autocomplete="off" spellcheck="false" required>
          </div>

          <div class="field">
            <label for="telegram_bot_token">Telegram Bot HTTP API Token</label>
            <input id="telegram_bot_token" name="telegram_bot_token" type="password" autocomplete="off" spellcheck="false" required>
          </div>

          <div class="action-row">
            <div id="status" class="status" role="status" aria-live="polite"></div>
            <button id="start-button" type="submit">Create My Bot Link</button>
          </div>
        </form>

        <div id="launch-box" class="launch-box" aria-label="Chat URL generato">
          <label for="chat-url">Chat URL</label>
          <div class="launch-row">
            <a id="chat-url" class="chat-url" href="#" target="_blank" rel="noopener noreferrer"></a>
            <button id="copy-link" class="icon-button" type="button" title="Copia link" aria-label="Copia link">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="9" y="9" width="13" height="13" rx="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
            </button>
            <a id="open-link" class="open-link" href="#" target="_blank" rel="noopener noreferrer" title="Apri link" aria-label="Apri link">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M15 3h6v6"></path>
                <path d="M10 14 21 3"></path>
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
              </svg>
            </a>
          </div>
        </div>
      </section>
    </div>
  </main>

  <footer>
    <span>Powered by</span>
    <a href="https://openapi.com" target="_blank" rel="noopener noreferrer" aria-label="Openapi">
      <img src="/assets/logo-openapi-w.svg" alt="Openapi">
    </a>
  </footer>

  <script>
    const form = document.querySelector("#bot-form");
    const button = document.querySelector("#start-button");
    const statusBox = document.querySelector("#status");
    const launchBox = document.querySelector("#launch-box");
    const chatUrl = document.querySelector("#chat-url");
    const copyLink = document.querySelector("#copy-link");
    const openLink = document.querySelector("#open-link");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      button.disabled = true;
      statusBox.className = "status";
      statusBox.textContent = "Creating signed link...";

      try {
        const response = await fetch("/setup", {
          method: "POST",
          body: new URLSearchParams(new FormData(form)),
        });
        const payload = await response.json();
        statusBox.textContent = payload.message;
        statusBox.className = response.ok ? "status ok" : "status error";
        if (response.ok && payload.chat_url) {
          chatUrl.textContent = payload.chat_url;
          chatUrl.href = payload.chat_url;
          openLink.href = payload.chat_url;
          launchBox.classList.add("visible");
        }
      } catch (error) {
        statusBox.textContent = "Errore durante l'avvio del bot.";
        statusBox.className = "status error";
      } finally {
        button.disabled = false;
      }
    });

    copyLink.addEventListener("click", async () => {
      if (!chatUrl.href || chatUrl.href.endsWith("#")) {
        return;
      }

      await navigator.clipboard.writeText(chatUrl.href);
      statusBox.textContent = "Link copiato.";
      statusBox.className = "status ok";
    });
  </script>
</body>
</html>
